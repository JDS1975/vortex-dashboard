<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX Capital</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#22c55e;--green-bg:rgba(34,197,94,.1);--red:#ef4444;--red-bg:rgba(239,68,68,.1);--amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh}
.container{max-width:1280px;margin:0 auto;padding:16px}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
.login-box .logo{font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}.login-box .logo span{color:var(--blue)}
.login-box .subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}
.pin-input-group{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-digit{width:48px;height:56px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;outline:none}
.pin-digit:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.login-error{color:var(--red);font-size:12px;margin-top:12px;min-height:18px}
.login-setup{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.login-setup summary{font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:12px}
.login-setup input[type="text"]{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;margin:6px 0;outline:none}
.login-setup .hint{font-size:11px;color:var(--text3);margin-bottom:8px;text-align:left}
.setup-btn{width:100%;padding:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;margin-top:4px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.5px}.header h1 span{color:var(--blue)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
.status-dot.live{background:var(--green)}.status-dot.stale{background:var(--amber)}.status-dot.off{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text3)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.metric-value{font-size:20px;font-weight:700;font-family:var(--mono)}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px}
.metric-value.green{color:var(--green)}.metric-value.red{color:var(--red)}.metric-value.amber{color:var(--amber)}
.section-title{font-size:15px;font-weight:700;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.pair-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:10px;margin-bottom:20px}
.pair-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.pair-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pair-name{font-size:15px;font-weight:700;font-family:var(--mono)}
.pair-regime{font-size:10px;font-weight:500;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
.regime-TRENDING_BULL{background:var(--green-bg);color:var(--green)}.regime-TRENDING_BEAR{background:var(--red-bg);color:var(--red)}.regime-RANGING{background:var(--blue-bg);color:var(--blue)}
.pair-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.pair-stat-label{font-size:9px;color:var(--text3)}.pair-stat-value{font-size:12px;font-family:var(--mono);font-weight:500}
.chart-container{position:relative;height:100px}
.ob-table{width:100%;font-size:11px;margin-top:8px;border-collapse:collapse}
.ob-table th{font-size:9px;color:var(--text3);text-transform:uppercase;text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.ob-table td{padding:4px 6px;border-bottom:1px solid rgba(30,45,69,.3);font-family:var(--mono)}
.ob-bull{color:var(--green)}.ob-bear{color:var(--red)}
.detail-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.signal-detail{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:12px}
.signal-detail .label{color:var(--text3);font-size:10px}.signal-detail .val{font-family:var(--mono);font-weight:500}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;display:inline-block}
.badge-pass{background:var(--green-bg);color:var(--green)}.badge-reject{background:var(--red-bg);color:var(--red)}
.badge-long{background:var(--green-bg);color:var(--green)}.badge-short{background:var(--red-bg);color:var(--red)}
.badge-created{background:var(--blue-bg);color:var(--blue)}.badge-signal{background:var(--amber-bg);color:var(--amber)}
.badge-expired{background:rgba(100,116,139,.15);color:var(--text3)}
.events-table{width:100%;font-size:12px;border-collapse:collapse}
.events-table th{font-size:10px;color:var(--text3);text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
.events-table td{padding:8px 10px;border-bottom:1px solid rgba(30,45,69,.4);font-family:var(--mono);font-size:11px}
.features-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.feature-tag{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:10px;font-family:var(--mono)}
.tz-note{font-size:10px;color:var(--text3);font-style:italic;margin:4px 0}
.footer{text-align:center;padding:20px 0;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:24px}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.pair-grid{grid-template-columns:1fr}.signal-detail{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
<div class="login-box">
<div class="logo"><span>VORTEX</span> Capital</div>
<div class="subtitle">Introduce el código de acceso</div>
<div class="pin-input-group" id="pin-group">
<input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
<input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
<input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
<input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
<input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
<input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
</div>
<button class="login-btn" id="login-btn" onclick="attemptLogin()">Entrar</button>
<div class="login-error" id="login-error"></div>
<details class="login-setup" id="setup-section">
<summary>Primera vez — configurar acceso</summary>
<p class="hint">Introduce el Gist ID y elige un PIN de 6 dígitos:</p>
<input type="text" id="setup-gist" placeholder="Gist ID"><input type="text" id="setup-pin" placeholder="PIN 6 dígitos" maxlength="6">
<button class="setup-btn" onclick="setupAccess()">Guardar</button>
<div class="login-error" id="setup-error" style="margin-top:8px"></div>
</details></div></div>

<div class="container" id="dashboard" style="display:none">
<div class="header"><h1><span>VORTEX</span> Capital</h1>
<div class="header-right"><span><span class="status-dot" id="status-dot"></span><span id="status-text"></span></span>
<span id="last-update"></span><button class="logout-btn" onclick="logout()">Salir</button></div></div>
<div class="metrics" id="metrics-grid"></div>
<h3 class="section-title">Pares — estado actual</h3>
<div class="pair-grid" id="pair-grid"></div>
<div id="signals-section"></div>
<div id="events-section"></div>
<div class="footer">VORTEX Capital v5 — TFM UOC 2026 — Refresh 30s<br><a href="#" onclick="showChangePin()" style="color:var(--text3)">Cambiar PIN</a></div>
</div>

<script>
function xorEnc(t,k){let r='';for(let i=0;i<t.length;i++)r+=String.fromCharCode(t.charCodeAt(i)^k.charCodeAt(i%k.length));return btoa(r)}
function xorDec(e,k){try{const d=atob(e);let r='';for(let i=0;i<d.length;i++)r+=String.fromCharCode(d.charCodeAt(i)^k.charCodeAt(i%k.length));return r}catch{return''}}
const SK='vortex_enc',RM=30000;let gistId='',charts={},refreshTimer=null;
function getEnc(){return localStorage.getItem(SK)||''}
function setupAccess(){const g=document.getElementById('setup-gist').value.trim(),p=document.getElementById('setup-pin').value.trim(),e=document.getElementById('setup-error');
if(!g){e.textContent='Falta Gist ID';return}if(!/^\d{6}$/.test(p)){e.textContent='PIN: 6 dígitos';return}
const enc=xorEnc(g,p);localStorage.setItem(SK,enc);e.style.color='var(--green)';e.textContent='OK. Introduce PIN arriba.'}
function attemptLogin(){const dg=document.querySelectorAll('#pin-group .pin-digit');let pin='';dg.forEach(d=>pin+=d.value);
const err=document.getElementById('login-error');if(pin.length!==6){err.textContent='6 dígitos';return}
const enc=getEnc();if(!enc){err.textContent='Configura primero abajo';return}
const dec=xorDec(enc,pin);if(!/^[a-f0-9]{20,40}$/.test(dec)){err.textContent='Código incorrecto';dg.forEach(d=>{d.value='';d.style.borderColor='var(--red)'});
setTimeout(()=>dg.forEach(d=>d.style.borderColor=''),1500);dg[0].focus();return}
gistId=dec;document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';startDashboard()}
function logout(){gistId='';if(refreshTimer)clearInterval(refreshTimer);document.getElementById('dashboard').style.display='none';
document.getElementById('login-screen').style.display='flex';document.querySelectorAll('#pin-group .pin-digit').forEach(d=>d.value='');document.getElementById('login-error').textContent=''}
function showChangePin(){if(!confirm('¿Cambiar PIN?'))return;localStorage.removeItem(SK);logout();document.getElementById('setup-section').open=true}
document.addEventListener('DOMContentLoaded',()=>{const dg=document.querySelectorAll('#pin-group .pin-digit');
dg.forEach((inp,i)=>{inp.addEventListener('input',()=>{inp.value=inp.value.replace(/\D/g,'').slice(0,1);if(inp.value&&i<dg.length-1)dg[i+1].focus();if(inp.value&&i===dg.length-1)document.getElementById('login-btn').focus()});
inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)dg[i-1].focus();if(e.key==='Enter')attemptLogin()});
inp.addEventListener('paste',e=>{e.preventDefault();const t=(e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,6);t.split('').forEach((c,j)=>{if(dg[j])dg[j].value=c})})});
if(!getEnc())document.getElementById('setup-section').open=true});

async function fetchData(){try{const r=await fetch('https://api.github.com/gists/'+gistId,{cache:'no-store'});if(!r.ok)throw 0;const g=await r.json();return JSON.parse(g.files['vortex_dashboard.json'].content)}catch(e){return null}}

function fmtP(v){return v>100?v.toFixed(2):v.toFixed(5)}

function renderMetrics(d){const g=document.getElementById('metrics-grid'),b=d.balance||0,pnl=d.pnl_day||0,
pc=pnl>=0?'green':'red',ps=pnl>=0?'+':'';
g.innerHTML=`<div class="metric"><div class="metric-label">Balance</div><div class="metric-value">$${b.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="metric-sub">Equity: $${(d.equity||b).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
<div class="metric"><div class="metric-label">PnL día</div><div class="metric-value ${pc}">${ps}$${Math.abs(pnl).toFixed(2)}</div><div class="metric-sub">${ps}${d.pnl_day_pct||0}% | DD: ${d.dd_total_pct||0}%</div></div>
<div class="metric"><div class="metric-label">Pipelines</div><div class="metric-value">${d.pipeline_count||0}</div><div class="metric-sub">${Object.keys(d.pairs||{}).length} pares</div></div>
<div class="metric"><div class="metric-label">Señales</div><div class="metric-value ${(d.signals_csv||[]).length>0?'amber':''}">${(d.signals_csv||[]).length}</div><div class="metric-sub">${(d.trades||[]).length} trades</div></div>
<div class="metric"><div class="metric-label">Posiciones</div><div class="metric-value">${d.positions_count||0}/${d.positions_max||10}</div><div class="metric-sub">${d.market_status||'?'}</div></div>`}

function renderPairs(d){const g=document.getElementById('pair-grid');g.innerHTML='';
for(const[pair,info]of Object.entries(d.pairs||{})){const c=document.createElement('div');c.className='pair-card';
const reg=info.regime||'?',pr=info.price||0,atr=info.atr||0,md=info.min_dist_atr;
let dc='var(--text2)',ds='—';if(md!=null){ds=md.toFixed(1)+' ATR';dc=md<1?'var(--green)':md<3?'var(--amber)':'var(--text2)'}
const obs=info.ob_snapshots||[];let obRows='';
for(const ob of obs){const cls=ob.type==='BULL'?'ob-bull':'ob-bear';
obRows+=`<tr><td class="${cls}">${ob.type}</td><td>${fmtP(ob.low)} – ${fmtP(ob.high)}</td><td style="text-align:right">${ob.dist_atr!=null?ob.dist_atr.toFixed(1):'-'}</td><td style="text-align:right">${ob.confluence}</td><td style="text-align:right">${ob.age}</td><td style="font-size:9px;color:var(--text3)">${ob.created_dt||''}</td></tr>`}
let obTable='';if(obRows)obTable=`<table class="ob-table"><thead><tr><th>Tipo</th><th>Zona</th><th>Dist ATR</th><th>Conf</th><th>Age</th><th>Creado</th></tr></thead><tbody>${obRows}</tbody></table>`;
c.innerHTML=`<div class="pair-header"><span class="pair-name">${pair}</span><span class="pair-regime regime-${reg}">${reg.replace('_',' ')}</span></div>
<div class="pair-stats"><div><div class="pair-stat-label">Precio</div><div class="pair-stat-value">${fmtP(pr)}</div></div>
<div><div class="pair-stat-label">ATR M30</div><div class="pair-stat-value">${atr>100?atr.toFixed(1):atr.toFixed(5)}</div></div>
<div><div class="pair-stat-label">Dist min OB</div><div class="pair-stat-value" style="color:${dc}">${ds}</div></div>
<div><div class="pair-stat-label">OBs</div><div class="pair-stat-value"><span style="color:var(--green)">${info.obs_bull||0}B</span> <span style="color:var(--red)">${info.obs_bear||0}S</span></div></div>
<div><div class="pair-stat-label">Tocados hoy</div><div class="pair-stat-value">${info.touched||0}</div></div>
<div><div class="pair-stat-label">ADX H4</div><div class="pair-stat-value">${info.adx?info.adx.toFixed(1):'—'}</div></div></div>
<div class="chart-container"><canvas id="chart-${pair}"></canvas></div>${obTable}`;
g.appendChild(c);renderChart(pair,d.price_history?.[pair]||[])}}

function renderChart(pair,hist){const cv=document.getElementById('chart-'+pair);if(!cv||!hist.length)return;if(charts[pair])charts[pair].destroy();
const lb=hist.map(h=>(h.time.split(' ')[1]||'').slice(0,5)),pr=hist.map(h=>h.price),
up=pr.length>1&&pr[pr.length-1]>=pr[0],lc=up?'#22c55e':'#ef4444',fc=up?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)';
charts[pair]=new Chart(cv,{type:'line',data:{labels:lb,datasets:[{data:pr,borderColor:lc,backgroundColor:fc,borderWidth:1.5,pointRadius:0,fill:true,tension:.3}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
scales:{x:{display:true,grid:{display:false},ticks:{font:{size:8,family:"'JetBrains Mono'"},color:'#475569',maxTicksLimit:6}},
y:{display:true,position:'right',grid:{color:'rgba(30,45,69,.5)'},ticks:{font:{size:8,family:"'JetBrains Mono'"},color:'#475569',maxTicksLimit:4}}}}})}

function renderSignals(d){const sec=document.getElementById('signals-section');
const sigs=d.signals_csv||[];if(!sigs.length){sec.innerHTML='';return}
let html='<h3 class="section-title">Señales del día — detalle completo</h3>';
html+='<p class="tz-note">Horas en GMT+0 (signals.csv). Broker = GMT+2. El log usa hora broker.</p>';
for(const s of sigs){
const dir=s.direction||'';const passed=s.passed==='YES';
const features=(s.top5_features||'').split('|').filter(f=>f.trim());
let featHtml='';if(features.length){featHtml='<div style="grid-column:1/-1;margin-top:4px"><div class="label">Top features del modelo</div><div class="features-list">';
for(const f of features)featHtml+=`<span class="feature-tag">${f.trim()}</span>`;featHtml+='</div></div>'}
html+=`<div class="detail-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div><span style="font-family:var(--mono);font-weight:700;font-size:15px">${s.pair}</span> <span class="badge badge-${dir.toLowerCase()}">${dir}</span>
<span class="badge ${passed?'badge-pass':'badge-reject'}" style="margin-left:4px">${passed?'EJECUTADO':'RECHAZADO ML'}</span></div>
<span style="font-family:var(--mono);font-size:12px;color:var(--text3)">${s.time_gmt||''} GMT</span></div>
<div class="signal-detail">
<div><div class="label">Probabilidad ML</div><div class="val" style="color:${passed?'var(--green)':'var(--red)'}; font-size:16px">${(s.probability||0).toFixed(4)}</div></div>
<div><div class="label">Threshold requerido</div><div class="val" style="font-size:16px">${(s.threshold||0).toFixed(2)}</div></div>
<div><div class="label">Entry price</div><div class="val">${fmtP(s.entry||0)}</div></div>
<div><div class="label">ATR M30</div><div class="val">${s.atr?s.atr.toFixed(1):'-'}</div></div>
<div><div class="label">Spread</div><div class="val" style="color:${s.spread_atr_pct>1?'var(--red)':'var(--text)'}">${(s.spread_pips||0).toFixed(0)} pips (${(s.spread_atr_pct||0).toFixed(2)}x ATR)</div></div>
<div><div class="label">Régimen H4</div><div class="val"><span class="pair-regime regime-${s.regime||''}" style="font-size:10px">${(s.regime||'').replace('_',' ')}</span></div></div>
<div><div class="label">SL / TP (ATR)</div><div class="val">${s.sl_atr||'-'} / ${s.tp_atr||'-'}</div></div>
<div><div class="label">Confluencia OB</div><div class="val">${s.confluence||'-'}</div></div>
<div><div class="label">Age OB (barras)</div><div class="val">${s.ob_age!=null?s.ob_age:'-'}</div></div>
<div><div class="label">RSI M5</div><div class="val">${s.rsi_m5?s.rsi_m5.toFixed(1):'-'}</div></div>
<div style="grid-column:1/-1"><div class="label">Razón de rechazo</div><div class="val" style="color:var(--amber)">${s.block_reason||'—'}</div></div>
${featHtml}</div></div>`}
sec.innerHTML=html}

function renderEvents(d){const sec=document.getElementById('events-section');
let allEvents=[];for(const[pair,info]of Object.entries(d.pairs||{})){for(const ev of(info.ob_events||[]))allEvents.push({...ev,pair})}
if(!allEvents.length){sec.innerHTML='';return}
allEvents.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
let html='<h3 class="section-title">Eventos OB del día</h3>';
html+='<p class="tz-note">Horas en GMT+0 (ob_events.csv).</p>';
html+='<table class="events-table"><thead><tr><th>Hora GMT</th><th>Par</th><th>Evento</th><th>Tipo OB</th><th>Zona</th><th>Conf</th><th>Age</th><th>Detalle</th></tr></thead><tbody>';
for(const ev of allEvents){const cls=ev.type==='BULL'?'ob-bull':'ob-bear';
const evBadge=ev.event==='CREATED'?'badge-created':ev.event==='SIGNAL'?'badge-signal':'badge-expired';
html+=`<tr><td>${(ev.time||'').split(' ').pop()||''}</td><td style="font-weight:500">${ev.pair}</td>
<td><span class="badge ${evBadge}">${ev.event}</span></td><td class="${cls}">${ev.type}</td>
<td>${fmtP(ev.low||0)} – ${fmtP(ev.high||0)}</td><td>${ev.confluence||''}</td><td>${ev.age!=null?ev.age:''}</td>
<td style="font-size:10px;color:var(--text2);max-width:250px;overflow:hidden;text-overflow:ellipsis">${ev.detail||''}</td></tr>`}
html+='</tbody></table>';sec.innerHTML=html}

function updateStatus(d){const dot=document.getElementById('status-dot'),txt=document.getElementById('status-text'),lu=document.getElementById('last-update');
if(!d){dot.className='status-dot off';txt.textContent='Sin conexión';return}
const exp=d.exported_at?new Date(d.exported_at):null,age=exp?(new Date()-exp):Infinity,mins=Math.round(age/60000);
if(age<120000){dot.className='status-dot live';txt.textContent='En vivo'}
else if(age<600000){dot.className='status-dot stale';txt.textContent=`Hace ${mins} min`}
else{dot.className='status-dot off';txt.textContent=`Hace ${mins} min`}
lu.textContent=d.last_update?`Broker: ${d.last_update}`:''}

async function refresh(){const d=await fetchData();if(d){renderMetrics(d);renderPairs(d);renderSignals(d);renderEvents(d);updateStatus(d)}else updateStatus(null)}
function startDashboard(){refresh();refreshTimer=setInterval(refresh,RM)}
</script>
</body>
</html>
